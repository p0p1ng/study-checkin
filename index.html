<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备考打卡 💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'ZCOOL KuaiLe', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: float 8s ease-in infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(255, 105, 180, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            text-align: center;
            padding: 32px 24px;
        }

        .header h1 {
            font-size: 28px;
            color: #e85d75;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(232, 93, 117, 0.2);
        }

        .header .subtitle {
            font-size: 14px;
            color: #c97b8b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.6), rgba(255, 218, 185, 0.6));
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-4px);
        }

        .stat-box .number {
            font-size: 36px;
            font-weight: 700;
            color: #e85d75;
            line-height: 1;
        }

        .stat-box .label {
            font-size: 13px;
            color: #a0707a;
            margin-top: 6px;
        }

        .date-display {
            text-align: center;
            font-size: 18px;
            color: #c97b8b;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .checkin-card {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            border: 2px solid transparent;
            transition: all 0.4s ease;
        }

        .checkin-card.checked {
            border-color: #ff9a9e;
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.2), rgba(254, 207, 239, 0.2));
        }

        .checkin-card .subject-title {
            font-size: 18px;
            color: #e85d75;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkin-card textarea {
            width: 100%;
            border: 2px solid rgba(255, 154, 158, 0.3);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            background: rgba(255, 255, 255, 0.8);
            transition: border-color 0.3s ease;
        }

        .checkin-card textarea:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .checkin-card textarea:disabled {
            background: rgba(240, 240, 240, 0.6);
            color: #888;
        }

        .checkin-btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .makeup-subject-btn.selected {
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            border-color: transparent;
        }
        
        .makeup-subject-btn input[type="checkbox"] {
            display: none;
        }
        
        .detail-makeup-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 2px dashed #ff9a9e;
            border-radius: 10px;
            font-size: 13px;
            background: rgba(255, 154, 158, 0.1);
            color: #e85d75;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .detail-makeup-btn:hover {
            background: rgba(255, 154, 158, 0.2);
            transform: translateY(-1px);
        }

        .checkin-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.5);
        }

        .checkin-btn:disabled {
            background: linear-gradient(135deg, #ddd, #eee);
            color: #999;
            cursor: not-allowed;
        }

        .checkin-btn .btn-emoji {
            margin-right: 6px;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-title {
            font-size: 18px;
            color: #e85d75;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #ff9a9e;
        }

        .history-item .history-date {
            font-size: 14px;
            color: #c97b8b;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .history-item .history-subject {
            font-size: 13px;
            color: #555;
            margin-bottom: 4px;
            padding-left: 8px;
        }

        .history-item .history-content {
            font-size: 13px;
            color: #888;
            padding-left: 8px;
            white-space: pre-wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #c97b8b;
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        /* Password Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            padding: 40px 32px;
            text-align: center;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .modal-content .lock-emoji {
            font-size: 56px;
            margin-bottom: 16px;
            display: block;
        }

        .modal-content h2 {
            color: #e85d75;
            font-size: 22px;
            margin-bottom: 8px;
        }

        .modal-content p {
            color: #c97b8b;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .password-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid rgba(255, 154, 158, 0.4);
            border-radius: 16px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
            transition: border-color 0.3s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.5);
        }

        .error-msg {
            color: #e85d75;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 32px 28px;
            text-align: center;
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.6);
            z-index: 9500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            max-width: 320px;
            width: 90%;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .toast .toast-emoji {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            animation: bounce 0.6s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        .toast .toast-text {
            font-size: 16px;
            color: #e85d75;
            line-height: 1.6;
            font-weight: 600;
        }

        .toast .toast-close {
            margin-top: 16px;
            padding: 10px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Heart burst animation */
        @keyframes heartBurst {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 0.8; }
            100% { transform: scale(2) rotate(360deg); opacity: 0; }
        }

        .heart-particle {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 1500;
            animation: heartBurst 1s ease-out forwards;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #c97b8b;
        }

        .loading .spinner {
            font-size: 40px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
        }

        .footer .heart-beat {
            display: inline-block;
            animation: heartbeat 1.5s ease infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        /* Calendar */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .calendar-header .month-title {
            font-size: 18px;
            font-weight: 700;
            color: #e85d75;
        }

        .calendar-header .nav-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 154, 158, 0.4);
            border-radius: 12px;
            width: 36px;
            height: 36px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #e85d75;
        }

        .calendar-header .nav-btn:hover {
            background: rgba(255, 154, 158, 0.2);
            transform: scale(1.1);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .calendar-day-header {
            text-align: center;
            font-size: 13px;
            color: #c97b8b;
            font-weight: 600;
            padding: 8px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #555;
            cursor: default;
            transition: all 0.3s ease;
            position: relative;
        }

        .calendar-day.other-month {
            color: #bbb;
            background: rgba(255, 255, 255, 0.25);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.4), rgba(254, 207, 239, 0.4));
            border: 2px solid #ff9a9e;
            font-weight: 700;
            color: #e85d75;
        }

        .calendar-day.has-flower {
            cursor: pointer;
            border: 2px solid #ff9a9e;
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.2), rgba(254, 207, 239, 0.2));
        }

        .calendar-day.has-flower:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
        }

        .calendar-day .day-num {
            font-size: 13px;
            line-height: 1;
        }

        .calendar-day .checkin-dots {
            display: flex;
            gap: 3px;
            margin-top: 2px;
            justify-content: center;
        }

        .calendar-day .checkin-dots .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #ff9a9e;
        }

        .calendar-day .checkin-dots .dot.makeup {
            background: #f0a0d0;
            box-shadow: 0 0 3px rgba(240, 160, 208, 0.6);
        }

        .calendar-day.clickable-empty {
            cursor: pointer;
        }

        .calendar-day.clickable-empty:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
            background: rgba(255, 154, 158, 0.15);
        }

        .calendar-day.has-flower {
            cursor: pointer;
        }

        .calendar-day.has-flower:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 154, 158, 0.3);
        }

        /* Makeup badge */
        .makeup-badge {
            display: inline-block;
            font-size: 10px;
            background: linear-gradient(135deg, #f0a0d0, #fecfef);
            color: white;
            padding: 1px 6px;
            border-radius: 8px;
            margin-left: 6px;
            font-weight: 600;
            vertical-align: middle;
        }

        /* Makeup Modal */
        .makeup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .makeup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .makeup-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 28px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .makeup-overlay.show .makeup-card {
            transform: scale(1);
        }

        .makeup-card .makeup-title {
            font-size: 18px;
            color: #e85d75;
            font-weight: 700;
            margin-bottom: 18px;
            text-align: center;
        }

        .makeup-card .makeup-subjects {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        .makeup-card .makeup-subject-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid rgba(255, 154, 158, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            color: #c97b8b;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .makeup-card .makeup-subject-btn.selected {
            border-color: #ff9a9e;
            background: linear-gradient(135deg, rgba(255, 154, 158, 0.2), rgba(254, 207, 239, 0.2));
            color: #e85d75;
        }

        .makeup-card .makeup-subject-btn:hover {
            border-color: #ff9a9e;
        }

        .makeup-card textarea {
            width: 100%;
            border: 2px solid rgba(255, 154, 158, 0.3);
            border-radius: 14px;
            padding: 12px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 70px;
            background: rgba(255, 255, 255, 0.8);
            margin-bottom: 14px;
            transition: border-color 0.3s ease;
        }

        .makeup-card textarea:focus {
            outline: none;
            border-color: #ff9a9e;
        }

        .makeup-card .makeup-actions {
            display: flex;
            gap: 10px;
        }

        .makeup-card .makeup-confirm {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .makeup-card .makeup-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.5);
        }

        .makeup-card .makeup-cancel {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255, 154, 158, 0.3);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.7);
            color: #c97b8b;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .makeup-card .makeup-cancel:hover {
            border-color: #ff9a9e;
        }

        /* Day Detail Modal */
        .day-detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .day-detail-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .day-detail-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 28px;
            max-width: 360px;
            width: 90%;
            box-shadow: 0 12px 40px rgba(255, 105, 180, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .day-detail-overlay.show .day-detail-card {
            transform: scale(1);
        }

        .day-detail-card .detail-date {
            font-size: 18px;
            color: #e85d75;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }

        .day-detail-card .detail-item {
            background: rgba(255, 154, 158, 0.1);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
        }

        .day-detail-card .detail-subject {
            font-size: 14px;
            color: #e85d75;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .day-detail-card .detail-content {
            font-size: 13px;
            color: #666;
            white-space: pre-wrap;
        }

        .day-detail-card .detail-empty {
            text-align: center;
            color: #c97b8b;
            padding: 20px;
            font-size: 14px;
        }

        .day-detail-card .back-btn {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.4);
            transition: all 0.3s ease;
        }

        .day-detail-card .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 154, 158, 0.5);
        }

        /* 图片上传相关样式 */
        .image-upload-area {
            margin-top: 12px;
            border: 2px dashed rgba(255, 154, 158, 0.4);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
        }

        .image-upload-area:hover {
            border-color: #ff9a9e;
            background: rgba(255, 154, 158, 0.1);
        }

        .image-upload-area.has-image {
            border-style: solid;
            border-color: #ff9a9e;
            padding: 8px;
        }

        .image-upload-area input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }

        .upload-text {
            font-size: 13px;
            color: #c97b8b;
        }

        .upload-hint {
            font-size: 11px;
            color: #e0a0b0;
            margin-top: 4px;
        }

        .image-preview-container {
            position: relative;
            display: inline-block;
        }

        .image-preview {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .remove-image-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            border: none;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 4px rgba(255, 107, 107, 0.4);
        }

        /* 图片打卡记录展示 */
        .detail-image-container {
            margin-top: 10px;
            text-align: center;
        }

        .detail-image {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .detail-image:hover {
            transform: scale(1.02);
        }

        /* 图片放大模态框 */
        .image-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            padding: 20px;
        }

        .image-modal-overlay.show {
            display: flex;
        }

        .image-modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .image-modal-content img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .image-modal-close {
            position: absolute;
            top: -35px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        .image-modal-download {
            position: absolute;
            bottom: -35px;
            right: 0;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

    </style>
</head>
<body>
    <div class="floating-hearts" id="floatingHearts"></div>

    <!-- Password Modal -->
    <div class="modal-overlay" id="passwordModal">
        <div class="modal-content">
            <span class="lock-emoji">🔐</span>
            <h2>欢迎来到备考打卡</h2>
            <p>输入密码继续哦 💕</p>
            <input type="password" class="password-input" id="passwordInput" maxlength="6" placeholder="******">
            <button class="submit-btn" onclick="checkPassword()">进入打卡</button>
            <div class="error-msg" id="errorMsg"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container" id="mainContent" style="display: none;">
        <div class="glass-card header">
            <h1>备考打卡 💕</h1>
            <div class="subtitle">每一天的努力，都是为了更好的我们</div>
        </div>

        <div class="glass-card">
            <div class="date-display" id="dateDisplay"></div>
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="number" id="streakDays">0</div>
                    <div class="label">连续打卡天数 🔥</div>
                </div>
                <div class="stat-box">
                    <div class="number" id="totalDays">0</div>
                    <div class="label">总打卡天数 ✨</div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <div class="checkin-card" id="zhiceCard">
                <div class="subject-title">📚 职业能力倾向测验</div>
                <textarea id="zhiceContent" placeholder="今天学了什么职测内容呢？记录下来吧~（比如：言语理解、数量关系、判断推理等）"></textarea>
                
                <div class="image-upload-area" id="zhiceUploadArea" onclick="document.getElementById('zhiceImageInput').click()">
                    <input type="file" id="zhiceImageInput" accept="image/*" onchange="handleImageSelect('zhice', this)">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">点击上传学习照片（可选）</div>
                    <div class="upload-hint">支持jpg/png，最大20MB</div>
                </div>
                
                <button class="checkin-btn" id="zhiceBtn" onclick="checkIn('zhice')">
                    <span class="btn-emoji">💗</span>打卡职测
                </button>
            </div>

            <div class="checkin-card" id="jiaojiCard">
                <div class="subject-title">🍎 教育基础知识</div>
                <textarea id="jiaojiContent" placeholder="今天学了什么教基内容呢？记录下来吧~（比如：教育学、心理学、教育法规等）"></textarea>
                
                <div class="image-upload-area" id="jiaojiUploadArea" onclick="document.getElementById('jiaojiImageInput').click()">
                    <input type="file" id="jiaojiImageInput" accept="image/*" onchange="handleImageSelect('jiaoji', this)">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">点击上传学习照片（可选）</div>
                    <div class="upload-hint">支持jpg/png，最大20MB</div>
                </div>
                
                <button class="checkin-btn" id="jiaojiBtn" onclick="checkIn('jiaoji')">
                    <span class="btn-emoji">💖</span>打卡教基
                </button>
            </div>
        </div>

        <div class="glass-card history-section">
            <div class="history-title">📖 打卡日历</div>
            <div id="calendarContainer"></div>
        </div>

        <div class="footer">
            永远支持你 <span class="heart-beat">💕</span>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div class="day-detail-overlay" id="dayDetailOverlay" onclick="closeDayDetail(event)">
        <div class="day-detail-card" onclick="event.stopPropagation()">
            <div class="detail-date" id="detailDate"></div>
            <div id="detailContent"></div>
            <button class="back-btn" onclick="hideDayDetail()">← 返回</button>
        </div>
    </div>

    <!-- Makeup Check-in Modal -->
    <div class="makeup-overlay" id="makeupOverlay" onclick="closeMakeup(event)">
        <div class="makeup-card" onclick="event.stopPropagation()">
            <div class="makeup-title" id="makeupTitle">补打卡</div>
            <div class="makeup-subjects">
                <button class="makeup-subject-btn" id="makeupZhiceBtn" onclick="toggleMakeupSubject('zhice')">
                    <input type="checkbox" id="zhiceCheckbox"> 📚 职测
                </button>
                <button class="makeup-subject-btn" id="makeupJiaojiBtn" onclick="toggleMakeupSubject('jiaoji')">
                    <input type="checkbox" id="jiaojiCheckbox"> 🍎 教基
                </button>
            </div>
            <textarea id="makeupContent" placeholder="补打的内容是什么呢？~"></textarea>
            
            <div class="image-upload-area" id="makeupUploadArea" onclick="document.getElementById('makeupImageInput').click()">
                <input type="file" id="makeupImageInput" accept="image/*" onchange="handleMakeupImageSelect(this)">
                <div class="upload-icon">📸</div>
                <div class="upload-text">上传学习照片（可选）</div>
                <div class="upload-hint">支持jpg/png，最大20MB</div>
            </div>
            
            <div class="makeup-actions">
                <button class="makeup-cancel" onclick="hideMakeup()">取消</button>
                <button class="makeup-confirm" onclick="submitMakeup()">确认补打卡</button>
            </div>
        </div>
    </div>

    <!-- 上传loading遮罩 -->
    <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.45); z-index:10001; justify-content:center; align-items:center;">
        <div style="background:#fff; border-radius:16px; padding:32px 44px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.18);">
            <div style="font-size:40px; margin-bottom:14px; animation:loadingSpin 1s linear infinite;">🌸</div>
            <div style="font-size:16px; color:#666; font-weight:500;" id="loadingText">正在上传中，请稍候...</div>
        </div>
    </div>
    <style>@keyframes loadingSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }</style>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-emoji" id="toastEmoji">🎉</span>
        <div class="toast-text" id="toastText"></div>
        <button class="toast-close" onclick="hideToast()">好哒</button>
    </div>

    <!-- Image Modal -->
    <div class="image-modal-overlay" id="imageModal" onclick="closeImageModal(event)">
        <div class="image-modal-content" onclick="event.stopPropagation()">
            <button class="image-modal-close" onclick="hideImageModal()">✕</button>
            <img id="modalImage" src="" alt="打卡图片">
            <button class="image-modal-download" onclick="downloadImage()">📥 下载图片</button>
        </div>
    </div>

    <script>
        const API_URL = '';
        const PASSWORD = '123456';  // ← 修改这里换成你的密码

        let checkinData = {};
        let selectedImages = { zhice: null, jiaoji: null };
        let currentImageUrl = '';
        let makeupImage = null;

        function createFloatingHearts() {
            const container = document.getElementById('floatingHearts');
            const hearts = ['💕', '💖', '💗', '💓', '💝', '🌸', '✨'];
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (6 + Math.random() * 6) + 's';
                heart.style.fontSize = (14 + Math.random() * 16) + 'px';
                container.appendChild(heart);
            }
        }

        function showDate() {
            const now = new Date();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${weekdays[now.getDay()]}`;
            document.getElementById('dateDisplay').textContent = dateStr;
        }

        function setToken(token) {
            const data = { token, expires: Date.now() + 7 * 24 * 60 * 60 * 1000 };
            localStorage.setItem('checkin_token', JSON.stringify(data));
        }

        function getToken() {
            try {
                const raw = localStorage.getItem('checkin_token');
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (Date.now() > data.expires) {
                    localStorage.removeItem('checkin_token');
                    return null;
                }
                return data.token;
            } catch (e) {
                return null;
            }
        }

        function doLogin() {
            document.getElementById('passwordModal').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            init();
        }

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === PASSWORD) {
                setToken(PASSWORD);
                doLogin();
            } else {
                document.getElementById('errorMsg').textContent = '密码不对哦，再试一次 💕';
            }
        }

        function tryAutoLogin() {
            if (getToken() === PASSWORD) {
                doLogin();
            }
        }

        document.getElementById('passwordInput').addEventListener('input', function() {
            if (this.value.length === 6) {
                checkPassword();
            } else {
                document.getElementById('errorMsg').textContent = '';
            }
        });

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        async function init() {
            showDate();
            createFloatingHearts();
            initCalendar();
            await loadData();
            updateUI();
        }

        window.addEventListener('DOMContentLoaded', tryAutoLogin);

        async function loadData() {
            try {
                const res = await fetch('/api/data');
                checkinData = await res.json();
            } catch (e) {
                checkinData = { records: [], stats: {} };
            }
        }

        function getToday() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function updateUI() {
            const today = getToday();
            const records = checkinData.records || [];
            const stats = checkinData.stats || { streak: 0, total_days: 0 };
            const todayRecord = records.find(r => r.date === today) || {};

            // Update buttons
            const zhiceBtn = document.getElementById('zhiceBtn');
            const zhiceContent = document.getElementById('zhiceContent');
            const zhiceCard = document.getElementById('zhiceCard');

            if (todayRecord.zhice) {
                zhiceBtn.disabled = true;
                zhiceBtn.innerHTML = '<span class="btn-emoji">✅</span>已打卡';
                zhiceContent.value = todayRecord.zhice.content === '今日打卡 ✓' ? '' : (todayRecord.zhice.content || '');
                zhiceContent.disabled = true;
                zhiceCard.classList.add('checked');
            } else {
                zhiceBtn.disabled = false;
                zhiceBtn.innerHTML = '<span class="btn-emoji">💗</span>打卡职测';
                zhiceContent.value = '';
                zhiceContent.disabled = false;
                zhiceCard.classList.remove('checked');
            }

            const jiaojiBtn = document.getElementById('jiaojiBtn');
            const jiaojiContent = document.getElementById('jiaojiContent');
            const jiaojiCard = document.getElementById('jiaojiCard');

            if (todayRecord.jiaoji) {
                jiaojiBtn.disabled = true;
                jiaojiBtn.innerHTML = '<span class="btn-emoji">✅</span>已打卡';
                jiaojiContent.value = todayRecord.jiaoji.content === '今日打卡 ✓' ? '' : (todayRecord.jiaoji.content || '');
                jiaojiContent.disabled = true;
                jiaojiCard.classList.add('checked');
            } else {
                jiaojiBtn.disabled = false;
                jiaojiBtn.innerHTML = '<span class="btn-emoji">💖</span>打卡教基';
                jiaojiContent.value = '';
                jiaojiContent.disabled = false;
                jiaojiCard.classList.remove('checked');
            }

            // Update stats
            document.getElementById('streakDays').textContent = stats.streak || 0;
            document.getElementById('totalDays').textContent = stats.total_days || 0;

            // Update calendar
            renderCalendar();
        }

        let calendarYear, calendarMonth;

        function initCalendar() {
            const now = new Date();
            calendarYear = now.getFullYear();
            calendarMonth = now.getMonth();
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            const records = checkinData.records || [];
            const recordMap = {};
            records.forEach(r => { recordMap[r.date] = r; });

            const year = calendarYear;
            const month = calendarMonth;
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startOffset = firstDay.getDay();
            const daysInMonth = lastDay.getDate();

            const prevLastDay = new Date(year, month, 0).getDate();
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];

            let html = `
                <div class="calendar-header">
                    <button class="nav-btn" onclick="changeMonth(-1)">◀</button>
                    <div class="month-title">${year}年${month + 1}月</div>
                    <button class="nav-btn" onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid">
                    ${weekdays.map(d => `<div class="calendar-day-header">${d}</div>`).join('')}
            `;

            for (let i = startOffset - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${prevLastDay - i}</div>`;
            }

            const today = getToday();
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const record = recordMap[dateStr];
                const isToday = dateStr === today;
                const isPast = dateStr < today;
                let dots = '';
                let hasRecord = false;
                if (record) {
                    const z = !!record.zhice;
                    const j = !!record.jiaoji;
                    hasRecord = z || j;  // 只有当至少有一个科目打卡时才显示
                    const hasMakeup = (record.zhice && record.zhice.is_makeup) || (record.jiaoji && record.jiaoji.is_makeup);
                    if (z && j) {
                        const zClass = (record.zhice && record.zhice.is_makeup) ? 'dot makeup' : 'dot';
                        const jClass = (record.jiaoji && record.jiaoji.is_makeup) ? 'dot makeup' : 'dot';
                        dots = `<div class="checkin-dots"><span class="${zClass}"></span><span class="${jClass}"></span></div>`;
                    } else if (z) {
                        const zClass = (record.zhice && record.zhice.is_makeup) ? 'dot makeup' : 'dot';
                        dots = `<div class="checkin-dots"><span class="${zClass}"></span></div>`;
                    } else if (j) {
                        const jClass = (record.jiaoji && record.jiaoji.is_makeup) ? 'dot makeup' : 'dot';
                        dots = `<div class="checkin-dots"><span class="${jClass}"></span></div>`;
                    }
                }
                const classes = ['calendar-day'];
                if (isToday) classes.push('today');
                if (hasRecord) classes.push('has-flower');
                if (!hasRecord && isPast) classes.push('clickable-empty');

                let onclick = '';
                if (hasRecord) {
                    onclick = `onclick="showDayDetail('${dateStr}')"`;
                } else if (isPast) {
                    onclick = `onclick="showMakeup('${dateStr}')"`;
                }

                html += `<div class="${classes.join(' ')}" ${onclick}>
                    <div class="day-num">${d}</div>
                    ${dots}
                </div>`;
            }

            const totalCells = startOffset + daysInMonth;
            const nextDays = (7 - (totalCells % 7)) % 7;
            for (let d = 1; d <= nextDays; d++) {
                html += `<div class="calendar-day other-month">${d}</div>`;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function changeMonth(delta) {
            calendarMonth += delta;
            if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
            if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
            renderCalendar();
        }

        function showDayDetail(dateStr) {
            const records = checkinData.records || [];
            const record = records.find(r => r.date === dateStr);
            const today = getToday();
            const isPast = dateStr < today;

            document.getElementById('detailDate').textContent = dateStr;
            let html = '';
            
            const hasZhice = record && record.zhice;
            const hasJiaoji = record && record.jiaoji;

            if (!hasZhice && !hasJiaoji) {
                html = '<div class="detail-empty">当天没有打卡记录</div>';
                // 如果是过去的日期，显示补打卡按钮
                if (isPast) {
                    html += `<button class="detail-makeup-btn" onclick="hideDayDetail(); showMakeup('${dateStr}')">✨ 补打卡</button>`;
                }
            } else {
                // 显示职测
                if (hasZhice) {
                    const content = record.zhice.content === '今日打卡 ✓' ? '' : (record.zhice.content || '');
                    const makeupBadge = record.zhice.is_makeup ? '<span class="makeup-badge">补</span>' : '';
                    const imageHtml = record.zhice.image_path ? `
                        <div class="detail-image-container">
                            <img src="/api/image/${record.zhice.thumb_path}" 
                                 class="detail-image" 
                                 onclick="showImageModal('/api/image/${record.zhice.image_path}')"
                                 alt="打卡图片">
                        </div>
                    ` : '';
                    html += `
                        <div class="detail-item">
                            <div class="detail-subject">📚 职测 ${makeupBadge} ${record.zhice.time || ''}</div>
                            <div class="detail-content">${content || '只打卡，没记录~'}</div>
                            ${imageHtml}
                        </div>
                    `;
                } else if (isPast) {
                    // 职测未打卡，显示补打卡按钮
                    html += `
                        <div class="detail-item" style="border: 2px dashed #ff9a9e;">
                            <div class="detail-subject">📚 职测 <span style="color: #c97b8b; font-size: 12px;">未打卡</span></div>
                            <button class="detail-makeup-btn" onclick="hideDayDetail(); showMakeup('${dateStr}', 'zhice')">✨ 补打职测</button>
                        </div>
                    `;
                }
                
                // 显示教基
                if (hasJiaoji) {
                    const content = record.jiaoji.content === '今日打卡 ✓' ? '' : (record.jiaoji.content || '');
                    const makeupBadge = record.jiaoji.is_makeup ? '<span class="makeup-badge">补</span>' : '';
                    const imageHtml = record.jiaoji.image_path ? `
                        <div class="detail-image-container">
                            <img src="/api/image/${record.jiaoji.thumb_path}" 
                                 class="detail-image" 
                                 onclick="showImageModal('/api/image/${record.jiaoji.image_path}')"
                                 alt="打卡图片">
                        </div>
                    ` : '';
                    html += `
                        <div class="detail-item">
                            <div class="detail-subject">🍎 教基 ${makeupBadge} ${record.jiaoji.time || ''}</div>
                            <div class="detail-content">${content || '只打卡，没记录~'}</div>
                            ${imageHtml}
                        </div>
                    `;
                } else if (isPast) {
                    // 教基未打卡，显示补打卡按钮
                    html += `
                        <div class="detail-item" style="border: 2px dashed #ff9a9e;">
                            <div class="detail-subject">🍎 教基 <span style="color: #c97b8b; font-size: 12px;">未打卡</span></div>
                            <button class="detail-makeup-btn" onclick="hideDayDetail(); showMakeup('${dateStr}', 'jiaoji')">✨ 补打教基</button>
                        </div>
                    `;
                }
            }

            document.getElementById('detailContent').innerHTML = html;
            document.getElementById('dayDetailOverlay').classList.add('show');
        }

        function hideDayDetail() {
            document.getElementById('dayDetailOverlay').classList.remove('show');
        }

        function closeDayDetail(e) {
            if (e.target.id === 'dayDetailOverlay') hideDayDetail();
        }

        // Makeup check-in
        let makeupDate = '';
        let makeupSubjects = []; // 改为数组支持多选

        function showMakeup(dateStr, onlySubject) {
            makeupDate = dateStr;
            makeupSubjects = [];
            makeupImage = null;
            document.getElementById('makeupTitle').textContent = `补打卡 ${dateStr}`;
            document.getElementById('makeupContent').value = '';
            
            // 重置图片上传区域
            const uploadArea = document.getElementById('makeupUploadArea');
            uploadArea.innerHTML = `
                <input type="file" id="makeupImageInput" accept="image/*" onchange="handleMakeupImageSelect(this)">
                <div class="upload-icon">📸</div>
                <div class="upload-text">上传学习照片（可选）</div>
                <div class="upload-hint">支持jpg/png，最大20MB</div>
            `;
            uploadArea.classList.remove('has-image');
            
            // 根据已有记录，禁用已打卡的科目
            const zhiceBtn = document.getElementById('makeupZhiceBtn');
            const jiaojiBtn = document.getElementById('makeupJiaojiBtn');
            const zhiceCheckbox = document.getElementById('zhiceCheckbox');
            const jiaojiCheckbox = document.getElementById('jiaojiCheckbox');
            
            zhiceBtn.classList.remove('selected', 'disabled');
            jiaojiBtn.classList.remove('selected', 'disabled');
            zhiceCheckbox.checked = false;
            zhiceCheckbox.disabled = false;
            jiaojiCheckbox.checked = false;
            jiaojiCheckbox.disabled = false;
            
            // 查找当天已有记录
            const records = checkinData.records || [];
            const existingRecord = records.find(r => r.date === dateStr);
            
            if (existingRecord) {
                if (existingRecord.zhice) {
                    zhiceBtn.classList.add('disabled');
                    zhiceCheckbox.disabled = true;
                }
                if (existingRecord.jiaoji) {
                    jiaojiBtn.classList.add('disabled');
                    jiaojiCheckbox.disabled = true;
                }
            }
            
            // 如果指定了 onlySubject，自动选中该科目
            if (onlySubject) {
                const btn = document.getElementById(onlySubject === 'zhice' ? 'makeupZhiceBtn' : 'makeupJiaojiBtn');
                const checkbox = document.getElementById(onlySubject === 'zhice' ? 'zhiceCheckbox' : 'jiaojiCheckbox');
                if (!checkbox.disabled) {
                    checkbox.checked = true;
                    btn.classList.add('selected');
                    makeupSubjects.push(onlySubject);
                }
            }
            
            document.getElementById('makeupOverlay').classList.add('show');
        }

        function hideMakeup() {
            document.getElementById('makeupOverlay').classList.remove('show');
        }

        function closeMakeup(e) {
            if (e.target.id === 'makeupOverlay') hideMakeup();
        }

        function toggleMakeupSubject(subject) {
            const checkbox = document.getElementById(subject === 'zhice' ? 'zhiceCheckbox' : 'jiaojiCheckbox');
            const btn = document.getElementById(subject === 'zhice' ? 'makeupZhiceBtn' : 'makeupJiaojiBtn');
            
            if (checkbox.disabled) return;
            
            checkbox.checked = !checkbox.checked;
            btn.classList.toggle('selected', checkbox.checked);
            
            // 更新选中的科目数组
            if (checkbox.checked) {
                if (!makeupSubjects.includes(subject)) {
                    makeupSubjects.push(subject);
                }
            } else {
                makeupSubjects = makeupSubjects.filter(s => s !== subject);
            }
        }

        async function submitMakeup() {
            if (makeupSubjects.length === 0) {
                showToast('至少选一个科目哦~', '😊');
                return;
            }
            const content = document.getElementById('makeupContent').value.trim();

            // 如果有图片，使用FormData
            if (makeupImage) {
                showLoading('正在上传图片补打卡...');
                const formData = new FormData();
                formData.append('date', makeupDate);
                formData.append('subjects', makeupSubjects.join(','));
                formData.append('content', content);
                formData.append('image', makeupImage);

                try {
                    const res = await fetch('/api/makeup', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await res.json();

                    hideLoading();
                    if (result.status === 'ok') {
                        hideMakeup();
                        await loadData();
                        updateUI();
                        showToast(result.message || '补打卡成功！📸💕', '📸');
                    } else {
                        showToast(result.message || '补打卡失败了~', '😅');
                    }
                } catch (e) {
                    hideLoading();
                    showToast('网络出了点小问题，再试一次吧~', '😅');
                }
            } else {
                // 没有图片，使用JSON
                try {
                    const res = await fetch('/api/makeup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ date: makeupDate, subjects: makeupSubjects, content })
                    });
                    const result = await res.json();

                    if (result.status === 'ok') {
                        hideMakeup();
                        await loadData();
                        updateUI();
                        showToast(result.message || '补打卡成功！💕', '💕');
                    } else {
                        showToast(result.message || '补打卡失败了~', '😅');
                    }
                } catch (e) {
                    showToast('网络出了点小问题，再试一次吧~', '😅');
                }
            }
        }

        // ========== Loading 控制 ==========
        function showLoading(text) {
            document.getElementById('loadingText').textContent = text || '正在上传中，请稍候...';
            document.getElementById('loadingOverlay').style.display = 'flex';
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // ========== 图片压缩（前端canvas） ==========
        function compressImage(file, maxSize, quality) {
            maxSize = maxSize || 1600;
            quality = quality || 0.7;
            return new Promise(function(resolve, reject) {
                // 小于500KB的不压缩
                if (file.size < 500 * 1024) { resolve(file); return; }
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var w = img.width, h = img.height;
                        if (w > maxSize || h > maxSize) {
                            var ratio = Math.min(maxSize / w, maxSize / h);
                            w = Math.round(w * ratio);
                            h = Math.round(h * ratio);
                        }
                        var canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        var ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        canvas.toBlob(function(blob) {
                            if (blob) resolve(blob);
                            else reject(new Error('压缩失败'));
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = function() { resolve(file); }; // 加载失败就用原图
                    img.src = e.target.result;
                };
                reader.onerror = function() { resolve(file); };
                reader.readAsDataURL(file);
            });
        }

        // ========== 图片选择处理 ==========
        async function handleImageSelect(subject, input) {
            const file = input.files[0];
            if (!file) return;

            // 验证文件大小
            if (file.size > 20 * 1024 * 1024) {
                showToast('图片太大啦，最大20MB哦~', '😅');
                input.value = '';
                return;
            }

            // 验证文件类型
            if (!file.type.startsWith('image/')) {
                showToast('只能上传图片哦~', '😅');
                input.value = '';
                return;
            }

            // 前端压缩（选图时就压缩，避免上传大文件）
            try {
                var compressed = await compressImage(file, 1600, 0.7);
                selectedImages[subject] = compressed;
            } catch(err) {
                selectedImages[subject] = file; // 压缩失败用原图
            }

            // 显示预览
            const uploadArea = document.getElementById(subject + 'UploadArea');

            const reader = new FileReader();
            reader.onload = function(e) {
                uploadArea.innerHTML = `
                    <div class="image-preview-container">
                        <img src="${e.target.result}" class="image-preview" alt="预览">
                        <button class="remove-image-btn" onclick="removeImage('${subject}', event)">✕</button>
                    </div>
                `;
                uploadArea.classList.add('has-image');
            };
            reader.readAsDataURL(selectedImages[subject]);
        }

        // 移除选中的图片
        function removeImage(subject, event) {
            event.stopPropagation();
            selectedImages[subject] = null;

            const uploadArea = document.getElementById(subject + 'UploadArea');
            const input = document.getElementById(subject + 'ImageInput');

            uploadArea.innerHTML = `
                <input type="file" id="${subject}ImageInput" accept="image/*" onchange="handleImageSelect('${subject}', this)">
                <div class="upload-icon">📸</div>
                <div class="upload-text">点击上传学习照片（可选）</div>
                <div class="upload-hint">支持jpg/png，最大20MB</div>
            `;
            uploadArea.classList.remove('has-image');
            input.value = '';
        }

        // 补打卡图片选择
        async function handleMakeupImageSelect(input) {
            const file = input.files[0];
            if (!file) return;

            if (file.size > 20 * 1024 * 1024) {
                showToast('图片太大啦，最大20MB哦~', '😅');
                input.value = '';
                return;
            }

            if (!file.type.startsWith('image/')) {
                showToast('只能上传图片哦~', '😅');
                input.value = '';
                return;
            }

            // 前端压缩
            try {
                var compressed = await compressImage(file, 1600, 0.7);
                makeupImage = compressed;
            } catch(err) {
                makeupImage = file;
            }

            const uploadArea = document.getElementById('makeupUploadArea');
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadArea.innerHTML = `
                    <div class="image-preview-container">
                        <img src="${e.target.result}" class="image-preview" alt="预览">
                        <button class="remove-image-btn" onclick="removeMakeupImage(event)">✕</button>
                    </div>
                `;
                uploadArea.classList.add('has-image');
            };
            reader.readAsDataURL(makeupImage);
        }

        // 移除补打卡图片
        function removeMakeupImage(event) {
            event.stopPropagation();
            makeupImage = null;

            const uploadArea = document.getElementById('makeupUploadArea');
            uploadArea.innerHTML = `
                <input type="file" id="makeupImageInput" accept="image/*" onchange="handleMakeupImageSelect(this)">
                <div class="upload-icon">📸</div>
                <div class="upload-text">上传学习照片（可选）</div>
                <div class="upload-hint">支持jpg/png，最大20MB</div>
            `;
            uploadArea.classList.remove('has-image');
        }

        // 图片模态框控制
        function showImageModal(imageUrl) {
            currentImageUrl = imageUrl;
            document.getElementById('modalImage').src = imageUrl;
            document.getElementById('imageModal').classList.add('show');
        }

        function hideImageModal() {
            document.getElementById('imageModal').classList.remove('show');
        }

        function closeImageModal(e) {
            if (e.target.id === 'imageModal') hideImageModal();
        }

        function downloadImage() {
            if (!currentImageUrl) return;
            const link = document.createElement('a');
            link.href = currentImageUrl;
            link.download = 'checkin-' + new Date().toISOString().slice(0, 10) + '.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function checkIn(subject) {
            const contentKey = subject + 'Content';
            const content = document.getElementById(contentKey).value.trim();
            const imageFile = selectedImages[subject];

            // 如果有图片，使用FormData
            if (imageFile) {
                showLoading('正在上传图片打卡...');
                const formData = new FormData();
                formData.append('subject', subject);
                formData.append('content', content);
                formData.append('image', imageFile);

                try {
                    const res = await fetch('/api/checkin', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await res.json();

                    hideLoading();
                    if (result.status === 'error') {
                        showToast(result.message, '😊');
                        return;
                    }

                    if (result.status === 'ok') {
                        removeImage(subject, new Event('click'));
                        await loadData();
                        updateUI();
                        showToast(result.message || '图片打卡成功！📸💕', '📸');
                        createHeartBurst();
                    }
                } catch (e) {
                    hideLoading();
                    showToast('网络出了点小问题，再试一次吧~', '😅');
                }
            } else {
                // 没有图片，使用JSON
                try {
                    const res = await fetch('/api/checkin', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ subject, content })
                    });
                    const result = await res.json();

                    if (result.status === 'error') {
                        showToast(result.message, '😊');
                        return;
                    }

                    if (result.status === 'ok') {
                        await loadData();
                        updateUI();
                        showToast(result.encouragement || '打卡成功！💕', '💕');
                        createHeartBurst();
                    }
                } catch (e) {
                    showToast('网络出了点小问题，再试一次吧~', '😅');
                }
            }
        }

        function showToast(text, emoji) {
            document.getElementById('toastText').textContent = text;
            document.getElementById('toastEmoji').textContent = emoji;
            document.getElementById('toast').classList.add('show');
        }

        function hideToast() {
            document.getElementById('toast').classList.remove('show');
        }

        function createHeartBurst() {
            const hearts = ['💕', '💖', '💗', '💓', '💝', '🌸', '✨', '🎉'];
            for (let i = 0; i < 12; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = (50 + (Math.random() - 0.5) * 40) + '%';
                heart.style.top = (50 + (Math.random() - 0.5) * 40) + '%';
                heart.style.animationDelay = (Math.random() * 0.3) + 's';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 1200);
            }
        }

    </script>
</body>
